<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{staff/fragments/_header :: common_header('Quản lý Giao dịch')}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <nav th:replace="~{staff/fragments/_header :: navbar}"></nav>
    <aside th:replace="~{staff/fragments/_header :: sidebar('transactions')}"></aside>
    <div class="content-wrapper">
        <section class="content-header"><h1>Giao dịch tại trạm <span class="text-primary"></span></h1></section>
        <section class="content">
            <div class="container-fluid">
                <div class="row mb-3"><div class="col-12"><a th:href="@{/staff/transactions/new}" class="btn btn-primary"><i class="fas fa-plus mr-2"></i>Tạo giao dịch mới</a></div></div>
                <div class="card">
                    <div class="card-header"><h3 class="card-title">Danh sách Giao dịch>0</span>)</h3></div>
                    <div class="card-body p-0">
                        <table class="table table-striped">
                            <thead><tr><th>ID</th><th>Pin cũ</th><th>Pin mới</th><th>Số tiền</th><th>Trạng thái TT</th><th>Ngày tạo</th></tr></thead>
                            <tbody>
                                <tr th:each="t : ${transactionPage.content}">
                                    <td th:text="${t.id}">1</td>
                                    <td><span th:text="${t.batteryIn != null ? t.batteryIn.serialNumber : ''}"></span></td>
                                    <td><span th:text="${t.batteryOut != null ? t.batteryOut.serialNumber : ''}"></span></td>
                                    <td th:text="${t.amount != null ? #numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT') : '0'} + ' đ'"></td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${t.paymentStatus == 'COMPLETED' ? 'badge-success' : (t.paymentStatus == 'PENDING' ? 'badge-warning' : 'badge-danger')}"
                                              th:text="${t.paymentStatus == 'COMPLETED' ? 'Đã thanh toán' : (t.paymentStatus == 'PENDING' ? 'Chưa thanh toán' : 'Thất bại')}">
                                        </span>
                                    </td>
                                    <td th:text="${t.createdAt != null ? #temporals.format(t.createdAt, 'dd/MM/yyyy HH:mm') : ''}"></td>
                                </tr>
                                <tr th:if="${transactionPage.empty}">
                                    <td colspan="6" class="text-center text-muted py-4">
                                        Không có giao dịch nào.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer clearfix" th:if="${transactionPage.totalPages > 1}">
                        <ul class="pagination pagination-sm m-0 float-right">
                            <li class="page-item" th:classappend="${transactionPage.first} ? 'disabled'">
                                <a class="page-link" th:href="@{/staff/transactions(page=${transactionPage.number - 1}, search=${search})}">«</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, transactionPage.totalPages - 1)}"
                                th:classappend="${i == transactionPage.number} ? 'active'">
                                <a class="page-link" th:href="@{/staff/transactions(page=${i}, search=${search})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${transactionPage.last} ? 'disabled'">
                                <a class="page-link" th:href="@{/staff/transactions(page=${transactionPage.number + 1}, search=${search})}">»</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div th:insert="~{admin/fragments/_footer :: footer}"></div>
</div>
<div th:insert="~{admin/fragments/_footer :: common_scripts}"></div>
</body>
</html>
