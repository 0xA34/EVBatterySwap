<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" style="overflow-x: hidden">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="X-UA-Compatible"
            content="IE=10; IE=9; IE=8; IE=7; IE=EDGE"
        />
        <title>Đăng nhập Nhân Viên</title>
        <link
            rel="stylesheet"
            type="text/css"
            href="https://cdn.ueh.edu.vn/qnp/lib/font-awesome/css/all.min.css"
        />
        <link
            rel="stylesheet"
            type="text/css"
            href="https://cdn.ueh.edu.vn/qnp/lib/bootstrap/dist/css/bootstrap.min.css"
        />
        <link rel="stylesheet" type="text/css" th:href="@{/css/staff.css}" />
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
    <body>
        <div id="login-page" class="container-fluid">
            <div class="row login-page">
                <div
                    class="d-none d-md-block col-sm-0 col-md-6 col-lg-7 col-xl-8 bg-qnp"
                ></div>
                <div
                    class="col-sm-12 col-md-6 col-lg-5 col-xl-4"
                    style="max-width: 550px; margin: auto"
                >
                    <div class="text-center mb-3">
                        <img
                            th:src="@{/assets/logo.png}"
                            style="width: 150px"
                            alt="Logo"
                        />
                    </div>
                    <div class="mb-3 text-center text-title">
                        <h4>Đăng Nhập Nhân Viên</h4>
                    </div>

                    <!-- Lỗi sai tài khoản / mật khẩu -->
                    <div
                        th:if="${error}"
                        class="alert alert-danger d-flex align-items-center mb-3"
                        role="alert"
                    >
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span th:text="${error}"
                            >Tài khoản hoặc mật khẩu không đúng!</span
                        >
                    </div>

                    <div class="tab-content" id="myTabContent">
                        <div
                            class="tab-pane fade show active"
                            id="employee"
                            role="tabpanel"
                            aria-labelledby="employee-tab"
                        >
                            <form id="loginFormStaff" method="post">
                                <div class="form-floating mt-3 mb-3">
                                    <input
                                        required
                                        type="text"
                                        class="form-control form-control-lg"
                                        id="employee_taikhoan"
                                        name="username"
                                        placeholder="Nhập tài khoản"
                                        autocomplete="on"
                                        autofocus
                                    />
                                    <label for="employee_taikhoan"
                                        >Nhập tài khoản</label
                                    >
                                </div>
                                <div
                                    class="form-floating mb-3 position-relative"
                                >
                                    <input
                                        required
                                        type="password"
                                        class="form-control form-control-lg"
                                        id="employee_password"
                                        name="password"
                                        placeholder="Nhập mật khẩu"
                                        autocomplete="on"
                                    />
                                    <label for="employee_password"
                                        >Nhập mật khẩu</label
                                    >
                                    <i
                                        class="fa-solid fa-eye"
                                        id="togglePassword"
                                        style="
                                            position: absolute;
                                            top: 50%;
                                            right: 15px;
                                            transform: translateY(-50%);
                                            cursor: pointer;
                                            color: #777;
                                        "
                                    ></i>
                                </div>
                                <button
                                    id="btnEmployeeLogin"
                                    class="mt-3 btn w-100 login-btn"
                                    type="submit"
                                >
                                    Đăng nhập
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SweetAlert2: Không có quyền truy cập (sai role) -->
        <script>
            document.getElementById("loginFormStaff").addEventListener("submit", async function(event){
                event.preventDefault(); // chặn submit truyền thống
                const formData = new FormData(this);
                const response = await fetch("/api/login", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (response.ok) { // Kiểm tra response.ok (status 200-299)
                    if (result.role === 'STAFF') {
                        Swal.fire({
                            heightAuto: false,
                            icon: 'success',
                            title: result.message, // Lấy message từ JSON
                            text: 'Chào mừng bạn quay trở lại.',
                            confirmButtonText: 'Chuyển hướng'
                        }).then(() => {
                            window.location.href = 'dashboard';
                        });
                    } else {
                        // Trường hợp đăng nhập đúng user/pass nhưng sai vai trò (Role)
                        Swal.fire({
                            heightAuto: false,
                            icon: 'warning',
                            title: 'Từ chối truy cập',
                            text: 'Tài khoản của bạn không có quyền.',
                            confirmButtonText: 'Đã hiểu'
                        });
                    }
                } else {
                    // Trường hợp sai username/password hoặc lỗi server
                    Swal.fire({
                        heightAuto: false,
                        icon: 'error',
                        title: 'Lỗi',
                        text: 'Đăng nhập thất bại'
                    });
                }
            });
        </script>



        <!-- Toggle mật khẩu -->
        <script>
            const togglePassword = document.getElementById("togglePassword");
            const passwordInput = document.getElementById("employee_password");
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener("click", function () {
                    const type =
                        passwordInput.getAttribute("type") === "password"
                            ? "text"
                            : "password";
                    passwordInput.setAttribute("type", type);
                    this.classList.toggle("fa-eye");
                    this.classList.toggle("fa-eye-slash");
                });
            }
        </script>
    </body>
</html>
