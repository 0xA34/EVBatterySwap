<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/_header :: common_header('Dashboard Tổng Quan')}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav th:replace="~{admin/fragments/_header :: navbar}"></nav>
    <aside th:replace="~{admin/fragments/_header :: sidebar('dashboard')}"></aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Tổng Quan Hệ Thống</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-success">
                            <div class="inner">
                                <h3 th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</h3>
                                <p>Tổng Doanh Thu</p>
                            </div>
                            <div class="icon"><i class="fas fa-coins"></i></div>
                            <a class="small-box-footer">Chi tiết <i class="fas fa-arrow-circle-right"></i></a>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-info">
                            <div class="inner">
                                <h3 th:text="${totalSwaps}">0</h3>
                                <p>Lượt đổi pin</p>
                            </div>
                            <div class="icon"><i class="fas fa-exchange-alt"></i></div>
                            <a class="small-box-footer">Xem nhật ký <i class="fas fa-arrow-circle-right"></i></a>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-warning">
                            <div class="inner">
                                <h3 th:text="${activeStations}">0</h3>
                                <p>Trạm hoạt động</p>
                            </div>
                            <div class="icon"><i class="fas fa-charging-station"></i></div>
                            <a class="small-box-footer">Quản lý trạm <i class="fas fa-arrow-circle-right"></i></a>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-danger">
                            <div class="inner">
                                <h3 th:text="${maintenanceBatteries}">0</h3>
                                <p>Pin cần bảo dưỡng</p>
                            </div>
                            <div class="icon"><i class="fas fa-tools"></i></div>
                            <a class="small-box-footer">Xử lý ngay <i class="fas fa-arrow-circle-right"></i></a>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <div class="card card-primary card-outline">
                            <div class="card-header">
                                <h3 class="card-title">
                                    <i class="far fa-chart-bar mr-1"></i>
                                    Tần suất đổi pin trong ngày (Giờ cao điểm)
                                </h3>
                                <div class="card-tools">
                                    <button type="button" class="btn btn-tool" data-card-widget="collapse"><i class="fas fa-minus"></i></button>
                                    <button type="button" class="btn btn-tool" data-card-widget="remove"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="chart">
                                    <canvas id="dashboardChart" style="min-height: 350px; height: 350px; max-height: 350px; max-width: 100%;"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>
    <footer th:replace="~{admin/fragments/_footer :: footer}"></footer>
</div>

<div th:replace="~{admin/fragments/_footer :: common_scripts}"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const hourlyReport = /*[[${hourlySwapReport}]]*/ [];
        
        // Khởi tạo mảng 24 giờ (từ 00:00 đến 23:00)
        const labels = Array.from({length: 24}, (_, i) => i + ':00');
        const data = Array(24).fill(0);
        
        // Cập nhật dữ liệu từ báo cáo
        if (hourlyReport && Array.isArray(hourlyReport)) {
            hourlyReport.forEach(item => {
                const hour = item.hour || item.HOUR;
                const count = item.count || item.COUNT;
                if(hour !== undefined && hour >= 0 && hour < 24) {
                    data[hour] = count;
                }
            });
        }
        
        const ctx = document.getElementById('dashboardChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Số lượt đổi pin',
                    data: data,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.raw + ' lượt';
                            }
                        }
                    }
                }
            }
        });
    });
</script>
</body>
</html>
