<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Đăng nhập Admin</title>

        <!-- Google Font: Source Sans Pro -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
        />
        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css"
        />
        <!-- AdminLTE -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
        />
        <!-- Bootstrap -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        />
        <!-- SweetAlert2 -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
    <body class="hold-transition login-page">
        <div class="login-box">
            <div class="login-logo">
                <a href="#"><b>Admin</b> Panel</a>
            </div>

            <div class="card">
                <div class="card-body login-card-body">
                    <p class="login-box-msg">
                        <strong>Xin chào, Admin !</strong><br />
                        Nhập tài khoản và mật khẩu admin để truy cập
                    </p>

                    <!-- Lỗi sai tài khoản / mật khẩu -->
                    <div
                        th:if="${error}"
                        class="alert alert-danger d-flex align-items-center mb-3"
                        role="alert"
                    >
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form id="loginFormAdmin" method="POST" novalidate>
                        <!-- Tài khoản admin -->
                        <div class="input-group mb-3">
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Tài khoản Admin"
                                required
                                autofocus
                            />
                            <div class="input-group-append">
                                <div class="input-group-text">
                                    <span class="fas fa-user"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Mật khẩu admin -->
                        <div class="input-group mb-3">
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Mật khẩu Admin"
                                required
                            />
                            <div class="input-group-append">
                                <div class="input-group-text">
                                    <span class="fas fa-lock"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Nút đăng nhập -->
                        <div class="row">
                            <div class="col-12">
                                <button
                                    type="submit"
                                    class="btn btn-primary btn-block"
                                >
                                    <i class="fas fa-sign-in-alt mr-2"></i>
                                    Đăng nhập Admin
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- SweetAlert2: Bảng đỏ khi không có quyền truy cập -->
        <script>
            document.getElementById("loginFormAdmin").addEventListener("submit", async function(event){
                event.preventDefault(); // chặn submit truyền thống
                const formData = new FormData(this);
                const response = await fetch("/api/login", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (response.ok) { // Kiểm tra response.ok (status 200-299)
                    if (result.role === 'ADMIN') {
                        Swal.fire({
                            heightAuto: false,
                            icon: 'success',
                            title: result.message, // Lấy message từ JSON
                            text: 'Chào mừng bạn quay trở lại.',
                            confirmButtonText: 'Chuyển hướng'
                        }).then(() => {
                            window.location.href = '/my';
                        });
                    } else {
                        // Trường hợp đăng nhập đúng user/pass nhưng sai vai trò (Role)
                        Swal.fire({
                            heightAuto: false,
                            icon: 'warning',
                            title: 'Từ chối truy cập',
                            text: 'Tài khoản của bạn không có quyền.',
                            confirmButtonText: 'Đã hiểu'
                        });
                    }
                } else {
                    // Trường hợp sai username/password hoặc lỗi server
                    Swal.fire({
                        heightAuto: false,
                        icon: 'error',
                        title: 'Lỗi',
                        text: 'Đăng nhập thất bại'
                    });
                }
            });
        </script>
    </body>
</html>
