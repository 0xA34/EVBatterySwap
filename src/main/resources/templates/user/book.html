<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch thay pin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
    <style>
        /* Override all custom arrow effects from main CSS */
        .schedule .field select.field-select,
        .schedule .contact-form select,
        .schedule .contact-form .field select {
            background-image: none !important;
            appearance: auto !important;
            -webkit-appearance: menulist !important;
            -moz-appearance: menulist !important;
            padding-right: 16px !important;
        }

        .schedule .field select.field-select:focus,
        .schedule .contact-form select:focus,
        .schedule .contact-form .field select:focus {
            background-image: none !important;
            transform: none !important;
            box-shadow: none !important;
            border-color: #e2e8f0 !important;
        }

        /* Hide any pseudo elements */
        .schedule .field::after,
        .schedule .field::before,
        .schedule .field:focus-within::after,
        .schedule .field:focus-within::before {
            content: none !important;
            display: none !important;
        }
    </style>
</head>
<body>

<div th:replace="~{user/fragments/header :: site-header-user}"></div>

<main class="schedule">
    <div class="container">
        <div class="contact-form-wrapper">
            <div class="form-card">
                <div class="form-header">
                    <h1 class="form-title">Đặt lịch thay pin</h1>
                    <p>Chọn tỉnh, trạm, loại pin và thời gian để đặt lịch</p>
                </div>

                <form id="scheduleForm" class="contact-form" novalidate>
                    <div class="field">
                        <label class="label">Chọn tỉnh</label>
                        <select id="provinceSelect" class="field-select" required>
                            <option value="">-- Chọn tỉnh --</option>
                            <option value="Hà Nội">Hà Nội</option>
                            <option value="TP. Hồ Chí Minh">TP. Hồ Chí Minh</option>
                            <option value="Đà Nẵng">Đà Nẵng</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="label">Chọn trạm</label>
                        <select id="stationSelect" class="field-select" required disabled>
                            <option value="">-- Chọn trạm --</option>
                        </select>
                        <input type="hidden" id="stationNameInput">
                    </div>

                    <div class="field">
                        <label class="label">Chọn pin</label>
                        <select id="pinSelect" class="field-select" required disabled>
                            <option value="">-- Chọn pin --</option>
                        </select>
                        <input type="hidden" id="pinNameInput">
                    </div>

                    <div class="form-row">
                        <label class="field">
                            <span class="label">Thời điểm bắt đầu</span>
                            <input type="datetime-local" id="startTime" required>
                        </label>
                    </div>

                    <button type="submit" class="submit-button">Đặt lịch</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{user/fragments/footer :: site-footer}"></div>


<script>
    let dbStations = [];

    const provinceSelect = document.getElementById('provinceSelect');
    const stationSelect = document.getElementById('stationSelect');
    const pinSelect = document.getElementById('pinSelect');
    const stationNameInput = document.getElementById('stationNameInput');
    const pinNameInput = document.getElementById('pinNameInput');

    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const res = await fetch('/api/user/reservations/stations');
            if (res.ok) {
                dbStations = await res.json();
                
                const provinces = [...new Set(dbStations.map(s => s.province))];
                
                provinceSelect.innerHTML = '<option value="">-- Chọn tỉnh --</option>';
                provinces.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    provinceSelect.appendChild(opt);
                });
            }
        } catch(e) {
            console.error(e);
        }
    });

    provinceSelect.addEventListener('change', function() {
        const province = this.value;
        stationSelect.innerHTML = '<option value="">-- Chọn trạm --</option>';
        pinSelect.innerHTML = '<option value="">-- Chọn pin --</option>';
        stationSelect.disabled = true;
        pinSelect.disabled = true;
        stationNameInput.value = '';
        pinNameInput.value = '';

        if (!province) return;

        const filteredStations = dbStations.filter(s => s.province === province);
        filteredStations.forEach(station => {
            const opt = document.createElement('option');
            opt.value = station.id;
            opt.textContent = station.name + " (" + station.address + ")";
            opt.dataset.name = station.name;
            stationSelect.appendChild(opt);
        });
        stationSelect.disabled = false;
    });

    stationSelect.addEventListener('change', async function() {
        const stationId = this.value;
        pinSelect.innerHTML = '<option value="">-- Chọn pin --</option>';
        pinSelect.disabled = true;
        pinNameInput.value = '';
        stationNameInput.value = this.options[this.selectedIndex]?.dataset?.name || '';

        if (!stationId) return;

        try {
            const res = await fetch(`/api/user/reservations/stations/${stationId}/batteries`);
            if (res.ok) {
                const batteries = await res.json();
                batteries.forEach(pin => {
                    const opt = document.createElement('option');
                    opt.value = pin.id;
                    opt.textContent = pin.serialNumber + " - " + pin.capacity;
                    opt.dataset.name = pin.serialNumber;
                    pinSelect.appendChild(opt);
                });
                pinSelect.disabled = batteries.length === 0;
            }
        } catch (e) {
            console.error(e);
        }
    });

    pinSelect.addEventListener('change', function() {
        pinNameInput.value = this.options[this.selectedIndex]?.dataset?.name || '';
    });

    document.getElementById('scheduleForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!provinceSelect.value || !stationSelect.value || !pinSelect.value || !document.getElementById('startTime').value) {
            alert('Vui lòng chọn đầy đủ thông tin.');
            return;
        }

        const submitBtn = this.querySelector('.submit-button');
        const oldText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Đang xử lý...';

        try {
            const payload = {
                stationId: stationSelect.value,
                batteryId: pinSelect.value,
                pickupTime: document.getElementById('startTime').value
            };

            const response = await fetch('/api/user/reservations/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (response.ok && result.success) {
                alert('Đặt lịch thành công!');
                window.location.href = '/user/my';
            } else {
                alert(result.message || 'Có lỗi xảy ra.');
            }
        } catch (err) {
            console.error(err);
            alert('Lỗi kết nối máy chủ!');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = oldText;
        }
    });
</script>
</body>
</html>
